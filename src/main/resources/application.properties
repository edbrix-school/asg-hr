spring.application.name=hr

server.port = 8087
server.servlet.context-path = /hr/api


# --- DATABASE CONFIG ACTIVE ---
# Set Oracle as default,
# for oracle: java -jar 0.0.1-SNAPSHOT.jar
# use command line postgres for switching: java -jar 0.0.1-SNAPSHOT.jar --spring.profiles.active=postgres
# --- DATASOURCE CONFIG ---
spring.datasource.url=jdbc:oracle:thin:@//10.100.200.85:1521/ORAVADF
spring.datasource.username=PRODUCTION
spring.datasource.password=PRODUCTION_19C#
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# --- JPA DIALECT ---
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# --- DEFAULT SCHEMA ---
spring.jpa.properties.hibernate.default_schema=PRODUCTION

# Common Hikari settings
# Reduced pool size to prevent ORA-12516: TNS:listener could not find available handler
# If you still get this error, reduce maximum-pool-size further or increase Oracle PROCESSES limit
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=HikariPool-ASG
# Connection validation
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL
spring.datasource.hikari.validation-timeout=5000
# Leak detection - reduced threshold to catch leaks faster (30 seconds)
spring.datasource.hikari.leak-detection-threshold=30000
# Keep connections alive
spring.datasource.hikari.keepalive-time=300000
# Register JMX beans for monitoring connection pool
spring.datasource.hikari.register-mbeans=true

# Pagination defaults
pagination.page-number=0
pagination.page-size=10
pagination.sort-by=id
pagination.sort-dir=asc


# Microservices URLs
common-services.url=http://localhost:8083/common-services/api/
settings.service.url=http://localhost:8084/settings/api/
finance.service.url=http://localhost:8086/finance/api/